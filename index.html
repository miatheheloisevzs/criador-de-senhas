<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de senha</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="conteudo">

    <div class="conteudo-titulo">
        <img src="unlock.svg" alt="cadeado fechado">
        <h2 class="titulo-principal">Gerador de senhas</h2>
        <h3 class="titulo-secundario">
            Gere instantaneamente uma senha aleatoria e segura
        </h3>
    </div>

    <div class="conteudo-senha">
        <label for="campo-senha">Senha</label>
        <input name="senha" type="text" id="campo-senha">
    </div>

    <div class="parametro">

        <h3 class="parametro-titulo">Personalize sua senha</h3>

        <div class="parametro-coluna__senha">

            <!-- TAMANHO -->
            <div class="parametro-senha">
                <h4 class="parametro-senha__titulo">Numero de caracteres</h4>

                <div class="parametro-senha-botoes">
                    <button class="parametro-senha__botao">-</button>
                    <p class="parametro-senha__texto">12</p>
                    <button class="parametro-senha__botao">+</button>
                </div>
            </div>

            <!-- CHECKBOX -->
            <div class="parametro-senha">
                <h4 class="parametro-senha__titulo">Caracteristicas da senha</h4>

                <div class="parametro-senha-checkbox">
                    <input id="maiusculo" type="checkbox" class="checkbox" checked>
                    <label for="maiusculo">Letras maiusculas</label>
                </div>

                <div class="parametro-senha-checkbox">
                    <input id="minusculo" type="checkbox" class="checkbox">
                    <label for="minusculo">Letras minusculas</label>
                </div>

                <div class="parametro-senha-checkbox">
                    <input id="numero" type="checkbox" class="checkbox">
                    <label for="numero">Numeros</label>
                </div>

                <div class="parametro-senha-checkbox">
                    <input id="simbolo" type="checkbox" class="checkbox">
                    <label for="simbolo">Simbolos</label>
                </div>
            </div>

            <!-- FORCA -->
            <div class="parametro-senha">
                <h4 class="parametro-senha__titulo">Forca da senha</h4>

                <div class="barra">
                    <div class="forca fraca"></div>
                </div>

                <div class="parametro-senha-textos">
                    <p>Fraca</p>
                    <p>Media</p>
                    <p>Forte</p>
                </div>

            </div>

        </div>
    </div>

</section>

</body>
</html>
